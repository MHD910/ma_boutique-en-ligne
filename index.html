<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL1_SHOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="showcart">
        <span><h1>WELCOM TO GL1 FRANGANCE </h1></span>
           
    <div class="container">
        <fieldset>
        <header>
           
            <div class="title">LIST DES PARFUMS </div>
            <div class="icon-cart">
                <svg aria-hidden="true" xmlns="http://w3.org" width="50" height="40" fill="none" viewBox="5 5 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 4h1.5L9 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-8.5-3h9.25L19 7h-1M8 7h-.688M13 5v4m-2-2h4"/>
                </svg>
                <span>0</span>
            </div>
        </header>

        <div class="listproduct">
            <!-- Injecté par JS -->
        </div>
    </div>
</fieldset>
    <div class="carttab">
        <h1>PANIER DE SHOPPING</h1>
        
        <div class="listcart">
            <!-- Injecté par JS -->
        </div>

        <div class="totalCart">
            <div class="totalText">TOTAL</div>
            <div class="totalValue">$0</div>
        </div>

        <div class="btn">
            <button class="close"><h2>Fermer </h2></button>
            <button class="checkout"><h2>Payment</h2></button>
        </div>
    </div>

    <!-- Modal de Paiement -->
    <div id="payment-modal" class="payment-modal-overlay">
        <div class="payment-modal-content">
            <h2>CHOISIR LE PAIEMENT</h2>
            <p>Montant à régler : <strong id="payment-amount">$0</strong></p>
            
            <div class="payment-options">
                <button class="pay-btn stripe" onclick="processPayment('Carte Bancaire')">💳 Carte Bancaire</button>
                <button class="pay-btn paypal" onclick="processPayment('PayPal')">🅿️ PayPal</button>
                <button class="pay-btn cancel" onclick="closePayment()">Annuler</button>
            </div>
        </div>
    </div>
   
    <script src="app.js"></script>  
</body>
</html>
